version: "3.9"

# ──────────────────────────────────────────────────────────────────────
# Run SonarQube locally — free Community Edition
# Start:   docker compose -f docker-compose.sonar.yml up -d
# Access:  http://localhost:9000
# Login:   admin / admin  (change on first login)
# ──────────────────────────────────────────────────────────────────────
services:
  sonarqube:
    image: sonarqube:10.4-community
    container_name: bankapp-sonarqube
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_logs:/opt/sonarqube/logs
      - sonar_extensions:/opt/sonarqube/extensions
    depends_on:
      sonar-postgres:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  sonar-postgres:
    image: postgres:16-alpine
    container_name: sonar-postgres
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    volumes:
      - sonar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sonar_data:
  sonar_logs:
  sonar_extensions:
  sonar_postgres_data:

name: BankApp CI/CD Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - develop
      - "release/**"
      - "hotfix/**"

  pull_request:
    branches:
      - main
      - develop

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

      skip_tests:
        description: "Skip test stage (emergency deploy only)"
        required: false
        default: "false"
        type: boolean

env:
  JAVA_VERSION: "21"
  REGISTRY: docker.io
  IMAGE_NAME: rohan700/bankapp

jobs:
  test:
    name: "Test [JDK ${{ matrix.java }}]"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java: ["21", "17"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: "temurin"

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests
        if: ${{ github.event.inputs.skip_tests != 'true' }}
        run: mvn test -B -Dspring.profiles.active=test

      - name: Debug test reports
        if: always()
        run: |
          echo "=== Checking Surefire Reports ==="
          find . -type f | grep surefire || true

      - name: Generate test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "JUnit Tests (JDK ${{ matrix.java }})"
          path: "**/target/surefire-reports/*.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.java == '21'
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 7

  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Build without tests (for scan)
        run: mvn package -DskipTests -B -q

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "bankapp"
          path: "."
          format: "HTML"
          out: "reports/dependency-check"
          args: >
            --failOnCVSS 7
            --enableRetired

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports/dependency-check/
          retention-days: 14

  build-image:
    name: "Build & Push Image"
    runs-on: ubuntu-latest
    needs:
      - test
      - security-scan

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Scan built image with Trivy
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: table
          exit-code: "1"
          severity: "CRITICAL"

  deploy-staging:
    name: "Deploy to Staging"
    runs-on: ubuntu-latest
    needs: build-image

    environment:
      name: staging
      url: http://staging.bankapp.local:8080

    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging with Docker Compose
        env:
          IMAGE_TAG: sha-${{ github.sha }}
          APP_ENV: staging
        run: |
          echo "Deploying image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          export IMAGE_TAG=${IMAGE_TAG}
          docker compose -f docker-compose.yml up -d --pull always

      - name: Run smoke tests
        run: |
          echo "Waiting for app to be ready..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8080/actuator/health; then
              echo "App is healthy"
              exit 0
            fi
            echo "Attempt $i/12 failed, retrying in 10s..."
            sleep 10
          done
          echo "Smoke test FAILED — app did not become healthy"
          exit 1

      - name: Comment deployment status on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            for (const comment of comments) {
              if (comment.body.includes('🚀 Staging Deployment')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🚀 Staging Deployment
              | Field | Value |
              |---|---|
              | Image | \`${{ env.IMAGE_NAME }}:sha-${{ github.sha }}\` |
              | Environment | staging |
              | Status | ✅ Deployed |
              | Health | http://staging.bankapp.local:8080/actuator/health |
              `
            });

  deploy-production:
    name: "Deploy to Production"
    runs-on: ubuntu-latest
    needs:
      - build-image
      - deploy-staging

    environment:
      name: production
      url: http://bankapp.production.local:8080

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Blue-Green deploy to production
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          echo "=== Blue-Green Deployment ==="
          echo "Step 1: Deploy to GREEN slot"
          echo "Step 2: Health check GREEN slot"
          echo "Step 3: Switch traffic to GREEN"
          echo "Step 4: Keep BLUE running for 5 min rollback window"
          echo ""
          echo "Deploying: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

      - name: Production smoke test
        run: |
          echo "Running production smoke tests..."

      - name: Create release tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `v${new Date().toISOString().slice(0,10)}-${context.sha.slice(0,7)}`;

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            });

            console.log(`Created release tag: ${tag}`);

  rollback:
    name: "Rollback Production"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'

    environment:
      name: production

    steps:
      - name: Rollback to previous image
        run: |
          echo "Fetching last successful deployment sha..."
          echo "Rolling back to previous known-good image"

      - name: Notify rollback
        uses: actions/github-script@v7
        with:
          script: |
            console.log("Production rollback triggered");

  notify:
    name: "Pipeline Notification"
    runs-on: ubuntu-latest
    if: always()

    needs:
      - test
      - security-scan
      - build-image
      - deploy-staging

    steps:
      - name: Check overall pipeline status
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              test: '${{ needs.test.result }}',
              security: '${{ needs.security-scan.result }}',
              build: '${{ needs.build-image.result }}',
              staging: '${{ needs.deploy-staging.result }}',
            };

            const failed = Object.entries(jobs)
              .filter(([_, r]) => r === 'failure' || r === 'cancelled')
              .map(([name, result]) => `  - ${name}: ${result}`);

            if (failed.length > 0) {
              core.setFailed(`Pipeline failed:\n${failed.join('\n')}`);
              console.log('ALERT: Pipeline failure — would notify on-call here');
            } else {
              console.log('✅ All pipeline jobs passed');
            }
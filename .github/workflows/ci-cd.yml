# ================================================================
# BankApp — Production CI/CD Pipeline
#
# ADVANCED CONCEPTS USED:
#   - Reusable workflows (workflow_call)
#   - Concurrency control (cancel-in-progress)
#   - Job dependencies and needs
#   - Matrix strategy for multi-JDK testing
#   - Environment protection rules (staging, production)
#   - OIDC-based Docker login (no long-lived tokens)
#   - Artifact passing between jobs
#   - Conditional execution (if expressions)
#   - GitHub Script for PR comments
#   - Cache restoration across jobs
#   - Security scanning with Trivy
#   - Deployment status tracking
#
# 🐛 INTENTIONAL BUGS (find & fix them as part of training):
#   BUG-1: Line 58  — wrong branch filter causes pipeline to miss `main` pushes
#   BUG-2: Line 117 — Maven cache key never changes (stale cache bug)
#   BUG-3: Line 152 — image tag strategy overwrites `latest` on every PR build
#   BUG-4: Line 196 — Trivy CRITICAL findings don't block the pipeline
#   BUG-5: Line 243 — production job missing `needs` for staging gate
# ================================================================

name: BankApp CI/CD Pipeline

# ----------------------------------------------------------------
# ADVANCED: Concurrency — cancel duplicate runs on the same branch
# Prevents 3 pushes in a row from stacking up 3 pipeline runs
# In prod this saves compute cost and avoids deploy races
# ----------------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ----------------------------------------------------------------
# TRIGGER CONFIGURATION
# ----------------------------------------------------------------
on:
  push:
    branches:
      # BUG-1: This only matches 'develop' — pushes to 'main' never
      # trigger the pipeline. Fix: add 'main' to this list.
      - main
      - develop
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - develop
  # Allow manual run with input parameters
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]
      skip_tests:
        description: "Skip test stage (emergency deploy only)"
        required: false
        default: "false"
        type: boolean

# ----------------------------------------------------------------
# Global env vars — available to all jobs
# ----------------------------------------------------------------
env:
  JAVA_VERSION: "21"
  REGISTRY: docker.io
  IMAGE_NAME: rohan700/bankapp

# ================================================================
# JOB 1: CODE QUALITY & UNIT TESTS
# ================================================================
jobs:
  test:
    name: "Test [JDK ${{ matrix.java }}]"
    runs-on: ubuntu-latest

    # ADVANCED: Matrix strategy — test on multiple JDK versions
    # Catches version-specific issues before they hit production
    strategy:
      fail-fast: false          # don't cancel other matrix jobs if one fails
      matrix:
        java: ["21", "17"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history needed for SonarQube blame

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: "temurin"

      # ADVANCED: Cache Maven dependencies
      # BUG-2: Cache key is STATIC — it never changes so you always
      # get the old cache even after adding new dependencies.
      # Fix: key should include a hash of pom.xml:
      #   key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests
        # ADVANCED: conditional — skip tests if emergency deploy
        if: ${{ github.event.inputs.skip_tests != 'true' }}
        run: mvn test -B -Dspring.profiles.active=test
        working-directory: .

      - name: Generate test report
        uses: dorny/test-reporter@v1
        if: always()            # run even if tests fail — you want to see the report
        with:
          name: "JUnit Tests (JDK ${{ matrix.java }})"
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

      # ADVANCED: Upload code coverage as artifact to pass between jobs
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.java == '21' # only upload once, not for each matrix entry
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 7

  # ================================================================
  # JOB 2: SECURITY SCANNING
  # ================================================================
  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: test               # only scan if tests pass

    # ADVANCED: Permissions — least-privilege OIDC
    # Instead of storing GITHUB_TOKEN as a secret, we declare
    # exactly which permissions this job needs
    permissions:
      contents: read
      security-events: write    # needed to upload SARIF results

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Build without tests (for scan)
        run: mvn package -DskipTests -B -q

      # ADVANCED: Trivy — container and filesystem vuln scanner
      # This is standard in prod pipelines (used by Shopify, Stripe, etc.)
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          # BUG-4: severity is set to HIGH only — CRITICAL vulns pass through
          # without blocking the pipeline. Fix: add CRITICAL to severity list:
          #   severity: "CRITICAL,HIGH"
          severity: "HIGH"
          exit-code: "0"        # BUG-4 PART 2: exit-code 0 means never fail
                                # Fix: exit-code: "1"

      # ADVANCED: Upload SARIF to GitHub Security tab
      # Makes findings visible in the Security > Code scanning alerts UI
      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      # ADVANCED: OWASP Dependency Check
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "bankapp"
          path: "."
          format: "HTML"
          out: "reports/dependency-check"
          args: >
            --failOnCVSS 7
            --enableRetired

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports/dependency-check/
          retention-days: 14

  # ================================================================
  # JOB 3: BUILD & PUSH DOCKER IMAGE
  # ================================================================
  build-image:
    name: "Build & Push Image"
    runs-on: ubuntu-latest
    needs: [test, security-scan]

    permissions:
      contents: read
      packages: write           # needed to push to GHCR

    # ADVANCED: Output the image tag so downstream jobs can use it
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ADVANCED: Docker Buildx — enables multi-platform builds
      # and BuildKit cache mounts (faster builds in CI)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ADVANCED: Log in to Docker Hub using secrets
      # In real prod, use OIDC with a role — no stored passwords
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ADVANCED: docker/metadata-action generates proper tags
      # based on git ref, sha, semver — industry standard
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # ADVANCED: GitHub Actions cache for Docker layers
          # Dramatically speeds up image builds on repeated runs
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # ADVANCED: Build provenance attestation (SLSA Level 1)
          # Creates a cryptographic record of how the image was built
          provenance: true
          sbom: true            # generates SBOM (Software Bill of Materials)

      # ADVANCED: Image vulnerability scan AFTER build
      # Scan the actual built image, not just source code
      - name: Scan built image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: table
          exit-code: "1"
          severity: "CRITICAL"

  # ================================================================
  # JOB 4: DEPLOY TO STAGING
  # ================================================================
  deploy-staging:
    name: "Deploy to Staging"
    runs-on: ubuntu-latest
    needs: build-image

    # ADVANCED: GitHub Environment — enables protection rules,
    # required reviewers, deployment history in GitHub UI
    environment:
      name: staging
      url: http://staging.bankapp.local:8080

    # Only deploy from main or release branches, not PRs
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging with Docker Compose
        env:
          IMAGE_TAG: sha-${{ github.sha }}
          APP_ENV: staging
        run: |
          echo "Deploying image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          # In real production this would SSH to staging server or
          # update a Kubernetes manifest and push to GitOps repo
          # For local practice: update docker-compose and deploy
          export IMAGE_TAG=${IMAGE_TAG}
          docker compose -f docker-compose.yml up -d --pull always

      # ADVANCED: Post-deploy smoke test
      # Don't trust the deploy succeeded — verify the app is actually healthy
      - name: Run smoke tests
        run: |
          echo "Waiting for app to be ready..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8080/actuator/health; then
              echo "App is healthy"
              exit 0
            fi
            echo "Attempt $i/12 failed, retrying in 10s..."
            sleep 10
          done
          echo "Smoke test FAILED — app did not become healthy"
          exit 1

      # ADVANCED: GitHub Script — post deployment info as PR comment
      # Engineers see deployment status directly in the PR
      - name: Comment deployment status on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            // Delete previous deploy comments to keep PR clean
            for (const comment of comments) {
              if (comment.body.includes('🚀 Staging Deployment')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🚀 Staging Deployment
              | Field | Value |
              |---|---|
              | Image | \`${{ env.IMAGE_NAME }}:sha-${{ github.sha }}\` |
              | Environment | staging |
              | Status | ✅ Deployed |
              | Health | http://staging.bankapp.local:8080/actuator/health |
              `
            });

  # ================================================================
  # JOB 5: DEPLOY TO PRODUCTION
  # ADVANCED: This job has a manual approval gate via GitHub Environments
  # ================================================================
  deploy-production:
    name: "Deploy to Production"
    runs-on: ubuntu-latest
    needs: [build-image, deploy-staging] # Added deploy-staging

    environment:
      name: production
      url: http://bankapp.production.local:8080

    # Production only deploys from main
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ADVANCED: Blue-Green deployment strategy
      # Deploy to the inactive slot, verify, then flip traffic
      - name: Blue-Green deploy to production
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          echo "=== Blue-Green Deployment ==="
          echo "Step 1: Deploy to GREEN slot"
          echo "Step 2: Health check GREEN slot"
          echo "Step 3: Switch traffic to GREEN"
          echo "Step 4: Keep BLUE running for 5 min rollback window"
          echo ""
          echo "Deploying: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          # In real prod: kubectl set image / update ALB target group weights

      - name: Production smoke test
        run: |
          echo "Running production smoke tests..."
          # curl production health endpoint

      # ADVANCED: Create GitHub Release tag on successful prod deploy
      - name: Create release tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `v${new Date().toISOString().slice(0,10)}-${context.sha.slice(0,7)}`;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            });
            console.log(`Created release tag: ${tag}`);

  # ================================================================
  # JOB 6: ROLLBACK (manual trigger only)
  # ADVANCED: Separate rollback job that can be triggered independently
  # ================================================================
  rollback:
    name: "Rollback Production"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    needs: []   # independent — can run without any other job

    environment:
      name: production

    steps:
      - name: Rollback to previous image
        run: |
          echo "Fetching last successful deployment sha..."
          # In real prod: query deployment API for last good sha
          # git log --oneline -10
          echo "Rolling back to previous known-good image"

      - name: Notify rollback
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⚠️ **Production Rollback Triggered** by @${{ github.actor }} at ${new Date().toISOString()}`
            });

  # ================================================================
  # JOB 7: NOTIFY — always runs, reports final status
  # ADVANCED: Pipeline observability — never let a failure go silent
  # ================================================================
  notify:
    name: "Pipeline Notification"
    runs-on: ubuntu-latest
    if: always()                # run regardless of other job outcomes
    needs: [test, security-scan, build-image, deploy-staging]

    steps:
      # ADVANCED: Aggregate job results and send one notification
      - name: Check overall pipeline status
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              test:           '${{ needs.test.result }}',
              security:       '${{ needs.security-scan.result }}',
              build:          '${{ needs.build-image.result }}',
              staging:        '${{ needs.deploy-staging.result }}',
            };

            const failed = Object.entries(jobs)
              .filter(([_, r]) => r === 'failure' || r === 'cancelled')
              .map(([name, result]) => `  - ${name}: ${result}`);

            if (failed.length > 0) {
              core.setFailed(`Pipeline failed:\n${failed.join('\n')}`);
              // In real prod: post to Slack/PagerDuty here
              console.log('ALERT: Pipeline failure — would notify on-call here');
            } else {
              console.log('✅ All pipeline jobs passed');
            }
